server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SSE 端点 - 禁用缓冲以支持实时进度推送
    location ~ ^/novelgraph/api/novels/[^/]+/progress$ {
        rewrite ^/novelgraph/api/(.*)$ /api/$1 break;
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
    }

    # API 请求 - 去掉 /novelgraph 前缀后转发到后端
    location /novelgraph/api/ {
        rewrite ^/novelgraph/api/(.*)$ /api/$1 break;
        proxy_pass http://server:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 前端静态资源
    location /novelgraph/ {
        alias /usr/share/nginx/html/;
        try_files $uri $uri/ /novelgraph/index.html;
    }

    # SPA 路由回退
    location /novelgraph {
        return 301 /novelgraph/;
    }
}